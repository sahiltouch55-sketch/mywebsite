<!DOCTYPE html>
<html>
<head>
<title>Complaint System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg, #4facfe, #00f2fe);
margin:0;
padding:20px;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:600px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
text-align:center;
margin-bottom:20px;
color:#333;
}

.input-group{
display:flex;
gap:10px;
margin-bottom:15px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#4facfe;
box-shadow:0 0 8px rgba(79,172,254,0.4);
}

button{
padding:12px 16px;
background:linear-gradient(135deg,#4facfe,#0077ff);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.logout{
position:absolute;
top:20px;
right:20px;
background:#ff4d4d;
}

.logout:hover{
background:#cc0000;
}

h3{
margin-top:20px;
color:#444;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f9f9f9;
padding:12px;
border-radius:8px;
margin:8px 0;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

li:hover{
background:#eef6ff;
transform:scale(1.02);
}

.empty{
text-align:center;
color:#888;
margin-top:10px;
}

</style>
</head>

<body>

<button class="logout" onclick="logout()">Logout</button>

<div class="container">

<h1>Complaint Management System</h1>

<div class="input-group">
<input type="text" id="complaint" placeholder="Enter your complaint...">
<button onclick="addComplaint()">Submit</button>
</div>

<h3>My Complaints</h3>

<ul id="complaintList">
<p class="empty">No complaints yet 🚀</p>
</ul>

</div>

<script src="script.js"></script>

</body>
</html>
