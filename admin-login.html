<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" id="loginUser" placeholder="Admin Username">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="adminLogin()">Login</button>

</div>

<script src="script.js"></script>

</body>
</html>
